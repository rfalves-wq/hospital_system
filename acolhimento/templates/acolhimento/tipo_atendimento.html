{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acolhimento</title>

    <link rel="stylesheet"
          href="{% static 'acolhimento/css/atendimento.css' %}">
</head>
<body>
<div class="container">

    <span class="subtitulo">
        ACOLHIMENTO
    </span>

    <h1>Selecione o tipo de atendimento</h1>

    <!-- Dados do Paciente -->
    <div class="paciente-box">

        <h3>🧑 Dados do Paciente</h3>

        <div class="paciente-grid">

            <div class="form-group">
                <label>Nome do Paciente</label>
                <input type="text" name="nome_paciente">
            </div>

            <div class="form-group">
                <label>CPF</label>
                <input type="text"
                       id="cpf"
                       name="cpf"
                       maxlength="14"
                       placeholder="000.000.000-00">
            </div>

            <div class="form-group">
                <label>Data de Nascimento</label>
                <input type="date"
                       id="data_nascimento"
                       name="data_nascimento">
            </div>

            <div class="form-group">
                <label>Idade</label>
                <input type="text"
                       id="idade"
                       readonly>
            </div>

        </div>

    </div>

    <!-- Sinais Vitais -->
    <div class="sinais-vitais">

        <div class="vital-card titulo">
            <span>DADOS</span>
            <span>VITAIS</span>
        </div>

        <div class="vital-card">
            <label>PA</label>
            <input type="text" placeholder="120x80">
        </div>

        <div class="vital-card">
            <label>T</label>
            <input type="text" placeholder="36,5 °C">
        </div>

        <div class="vital-card">
            <label>FR</label>
            <input type="text" placeholder="18 irpm">
        </div>

        <div class="vital-card">
            <label>PULSO</label>
            <input type="text" placeholder="72 bpm">
        </div>

        <div class="vital-card">
            <label>DOR</label>
            <input type="number" min="0" max="10" placeholder="0 - 10">
        </div>

    </div>

    <!-- Tipos de Atendimento -->
    <div class="cards">

        <a href="{% url 'atendimento_normal' %}" class="card normal">
            Atendimento<br>Normal
        </a>

        <a href="{% url 'triagem_risco' %}" class="card risco">
            Risco
        </a>

        <a href="{% url 'atendimento_preferencial' %}" class="card preferencial">
            Atendimento<br>Preferencial
        </a>

    </div>

</div>

<script src="{% static 'acolhimento/js/atendimento.js' %}"></script>

</body>
</html>
