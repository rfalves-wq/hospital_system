{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acolhimento</title>

    <link rel="stylesheet"
          href="{% static 'acolhimento/css/atendimento.css' %}">
</head>
<body>

<div class="container">

    <span class="subtitulo">
        ACOLHIMENTO
    </span>

    <h1>Selecione o tipo de atendimento</h1>

    {% if erro %}
<div class="alerta-erro">
    {{ erro }}
</div>
{% endif %}

    <form method="POST">
        {% csrf_token %}

        <!-- Dados do Paciente -->
        <div class="paciente-box">

            <h3>🧑 Dados do Paciente</h3>

            <div class="paciente-grid">

                <div class="form-group">
                    <label>Nome do Paciente</label>
                    <input type="text"
                           name="nome_paciente"
                           required>
                </div>

                <div class="form-group">
                    <label>CPF</label>
                    <input type="text"
                           id="cpf"
                           name="cpf"
                           maxlength="14"
                           placeholder="000.000.000-00">
                </div>

                <div class="form-group">
                    <label>Data de Nascimento</label>
                    <input type="date"
                           id="data_nascimento"
                           name="data_nascimento">
                </div>

                <div class="form-group">
                    <label>Idade</label>
                    <input type="text"
                           id="idade"
                           name="idade"
                           readonly>
                </div>

            </div>

        </div>

        <!-- Sinais Vitais -->
       <!-- Sinais Vitais -->
<div class="sinais-vitais">

    <div class="vital-card titulo">
        <span>DADOS</span>
        <span>VITAIS</span>
    </div>

   <div class="vital-card">
    <label>PA</label>
    <input type="text"
           name="pressao_arterial"
           placeholder="120x80"
           required>
</div>

    <div class="vital-card">
    <label>T</label>
    <input type="text"
           name="temperatura"
           placeholder="36,5"
           required>
</div>

   <div class="vital-card">
    <label>FR</label>
    <input type="number"
           name="frequencia_respiratoria"
           placeholder="18"
           required>
</div>

    <div class="vital-card">
    <label>PULSO</label>
    <input type="number"
           name="pulso"
           placeholder="72"
           required>
</div>

   <div class="vital-card">
    <label>DOR</label>
    <input type="number"
           name="dor"
           min="0"
           max="10"
           placeholder="0 - 10"
           required>
</div>

</div>

        <!-- Tipos de Atendimento -->
        <div class="cards">

            <button type="submit"
                    name="tipo_atendimento"
                    value="NORMAL"
                    class="card normal">
                Atendimento<br>Normal
            </button>

            <button type="submit"
                    name="tipo_atendimento"
                    value="RISCO"
                    class="card risco">
                Risco
            </button>

            <button type="submit"
                    name="tipo_atendimento"
                    value="PREFERENCIAL"
                    class="card preferencial">
                Atendimento<br>Preferencial
            </button>

        </div>

    </form>

</div>

<script src="{% static 'acolhimento/js/atendimento.js' %}"></script>

</body>
</html>
