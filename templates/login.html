{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

<h2>Entrar no Sistema</h2>

<form method="post">

{% csrf_token %}

<div class="mb-3">

<label>Usuário</label>

<input
type="text"
name="username"
class="form-control">

</div>

<div class="mb-3">

<label>Senha</label>

<input
type="password"
name="password"
class="form-control">

</div>

<button
type="submit"
class="btn btn-primary">

Entrar

</button>

</form>

</div>

{% endblock %}
